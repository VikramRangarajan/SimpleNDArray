repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.20
    hooks:
      # Run the linter.
      - id: ruff-check
        types_or: [python, pyi, jupyter, pyproject]
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
        types_or: [python, pyi, jupyter]
  - repo: https://github.com/facebook/pyrefly-pre-commit
    rev: 1.2.0.dev1 # Note: this is the version of the pre-commit hook, NOT the pyrefly version used for type checking
    hooks:
      - id: pyrefly-check
        name: Pyrefly (type checking)
        pass_filenames: false # Recommended to do full repo checks. However, you can change this to `true` to only check changed files
        language: system # Use system-installed pyrefly
